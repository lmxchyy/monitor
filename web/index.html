<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>企业数据驾驶舱</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<div id="app" v-cloak>

<header class="topbar">
  <h1>企业数据驾驶舱</h1>
  <button @click="refresh">刷新</button>
</header>

<section class="signal-grid">
  <div class="metric-panel">
    <span>企业数</span>
    <strong>{{ data.summary.companies }}</strong>
  </div>
  <div class="metric-panel">
    <span>融资事件</span>
    <strong>{{ data.summary.funding_events }}</strong>
  </div>
  <div class="metric-panel">
    <span>招聘信号</span>
    <strong>{{ data.summary.hiring_signals }}</strong>
  </div>
</section>

<section>
  <h2>热门行业</h2>
  <ul>
    <li v-for="item in data.industries">
      {{ item.name }} ({{ item.value }})
    </li>
  </ul>
</section>

<section>
  <h2>最新事件</h2>
  <ul>
    <li v-for="e in data.events">
      {{ e.title }} - {{ e.meta }}
    </li>
  </ul>
</section>

</div>
<script src="https://unpkg.com/vue@3"></script>
<script>
const { createApp, ref, onMounted } = Vue;
createApp({
  setup() {
    const data = ref({ summary: {}, industries: [], events: [] });

    async function load() {
      const res = await fetch('/api/dashboard');
      data.value = await res.json();
    }

    function refresh() {
      load();
    }

    onMounted(load);

    return { data, refresh };
  }
}).mount('#app');
</script>
</body>
</html>
